<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ที่เที่ยวเดชอุดม</title>

<style>
body{
    font-family: Arial;
    margin: 0;
    background: #eef2f3;
}

/* Header */
header{
    background: linear-gradient(90deg, #00c6ff, #0072ff);
    color: white;
    text-align: center;
    padding: 25px;
}

/* Grid */
.container{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* Card */
.card{
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    transition: 0.3s;
}

.card:hover{
    transform: scale(1.03);
}

.card img{
    width: 100%;
    height: 160px;
    object-fit: cover;
}

.card h3{
    margin: 10px;
}

.card p{
    margin: 0 10px 10px;
    color: #555;
}
